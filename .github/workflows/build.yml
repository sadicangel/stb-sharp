name: build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: 0.14.0
    - name: Restore dependencies
      run: dotnet restore StbSharp.slnx
    - name: Build
      run: dotnet build StbSharp.slnx --no-restore --configuration Release
    - name: Test
      run: dotnet test StbSharp.slnx --no-build --configuration Release --verbosity normal

  package:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: 0.14.0
    - name: Pack
      shell: pwsh
      run: dotnet pack src/StbSharp/StbSharp.csproj --configuration Release --output artifacts/packages
    - name: Verify package contents
      shell: pwsh
      run: |
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        $package = Get-ChildItem artifacts/packages/StbSharp.*.nupkg | Select-Object -First 1
        $zip = [System.IO.Compression.ZipFile]::OpenRead($package.FullName)
        $entries = $zip.Entries.FullName
        $zip.Dispose()
        $required = @(
          'runtimes/win-x64/native/stb_image.dll',
          'runtimes/linux-x64/native/libstb_image.so',
          'runtimes/osx-x64/native/libstb_image.dylib',
          'buildTransitive/StbSharp.targets'
        )
        foreach ($entry in $required) {
          if ($entry -notin $entries) {
            throw "Missing package entry: $entry"
          }
        }
